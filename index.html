<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor de Moedas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
 
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
 
    <main class="container">
 
      <!-- Cabeçalho -->
      <header class="app-header">
        <div class="header-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
        </div>
        <div>
          <h1 class="app-title">Conversor de Moedas</h1>
          <p class="app-subtitle">Taxas em tempo real via ExchangeRate-API</p>
        </div>
      </header>
 
      <!-- Card principal -->
      <div class="card">
 
        <!-- Valor de origem -->
        <div class="field-group">
          <label class="field-label" for="amount">Valor</label>
          <div class="input-wrap">
            <span class="input-currency-badge" id="from-badge">BRL</span>
            <input
              type="number"
              id="amount"
              class="field-input"
              value="1"
              min="0"
              step="any"
              placeholder="0"
              autocomplete="off"
            />
          </div>
        </div>
 
        <!-- Linha de seletores + botão swap -->
        <div class="selectors-row">
          <div class="select-group">
            <label class="field-label" for="from-currency">De</label>
            <div class="select-wrap">
              <select id="from-currency" class="field-select"></select>
              <span class="select-arrow">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </span>
            </div>
          </div>
 
          <button class="swap-btn" id="swap-btn" title="Inverter moedas" aria-label="Inverter moedas">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
              <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
            </svg>
          </button>
 
          <div class="select-group">
            <label class="field-label" for="to-currency">Para</label>
            <div class="select-wrap">
              <select id="to-currency" class="field-select"></select>
              <span class="select-arrow">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
              </span>
            </div>
          </div>
        </div>
 
        <!-- Botão converter -->
        <button class="convert-btn" id="convert-btn">
          <span class="convert-btn-text">Converter</span>
          <span class="convert-btn-spinner" id="spinner" aria-hidden="true"></span>
        </button>
 
        <!-- Resultado -->
        <div class="result-area" id="result-area">
          <div class="result-from" id="result-from"></div>
          <div class="result-equals">=</div>
          <div class="result-to" id="result-to"></div>
          <div class="result-rate" id="result-rate"></div>
        </div>
 
        <!-- Estado de erro -->
        <div class="error-area" id="error-area" hidden>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="error-msg"></span>
        </div>
 
      </div>
 
      <!-- Conversões rápidas populares -->
      <div class="quick-section">
        <p class="quick-title">Pares populares</p>
        <div class="quick-grid" id="quick-grid">
          <button class="quick-chip" data-from="USD" data-to="BRL">USD → BRL</button>
          <button class="quick-chip" data-from="EUR" data-to="BRL">EUR → BRL</button>
          <button class="quick-chip" data-from="BRL" data-to="USD">BRL → USD</button>
          <button class="quick-chip" data-from="GBP" data-to="BRL">GBP → BRL</button>
          <button class="quick-chip" data-from="BTC" data-to="USD">BTC → USD</button>
          <button class="quick-chip" data-from="EUR" data-to="USD">EUR → USD</button>
        </div>
      </div>
 
      <footer class="app-footer">
        Dados fornecidos por <a href="https://www.exchangerate-api.com" target="_blank" rel="noopener">ExchangeRate-API</a>
      </footer>
 
    </main>
 
    <script src="script.js"></script>
  </body>
</html>
